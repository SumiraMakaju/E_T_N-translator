<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TMT Translator</title>
<link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <header>
      <div class="brand">
        <svg class="brand-icon" width="18" height="18" viewBox="0 0 24 24" fill="none">
          <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        <span class="brand-name">TMT <span class="brand-sub">Translator</span></span>
      </div>
      <button id="btn-options" class="icon-btn" title="Settings">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none">
          <circle cx="12" cy="12" r="3" stroke="currentColor" stroke-width="2"/>
          <path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-2 2 2 2 0 01-2-2v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83 0 2 2 0 010-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 01-2-2 2 2 0 012-2h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 010-2.83 2 2 0 012.83 0l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 012-2 2 2 0 012 2v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 0 2 2 0 010 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 012 2 2 2 0 01-2 2h-.09a1.65 1.65 0 00-1.51 1z" stroke="currentColor" stroke-width="2"/>
        </svg>
      </button>
    </header>

    <div id="no-key-banner" class="banner banner-warn" style="display:none">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="2"/><line x1="12" y1="8" x2="12" y2="12" stroke="currentColor" stroke-width="2"/><line x1="12" y1="16" x2="12.01" y2="16" stroke="currentColor" stroke-width="2"/></svg>
      API key not set. <a href="#" id="banner-settings">Configure →</a>
    </div>

    <div class="lang-controls">
      <div class="lang-select-wrap">
        <label>From</label>
        <select id="src-lang">
          <option value="en">English</option>
          <option value="ne">Nepali</option>
          <option value="tmg">Tamang</option>
        </select>
      </div>
      <button id="swap-btn" class="swap-btn" title="Swap languages">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none">
          <path d="M7 16V4m0 0L3 8m4-4l4 4M17 8v12m0 0l4-4m-4 4l-4-4" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
      <div class="lang-select-wrap">
        <label>To</label>
        <select id="tgt-lang">
          <option value="ne">Nepali</option>
          <option value="en">English</option>
          <option value="tmg">Tamang</option>
        </select>
      </div>
    </div>

    <div class="textarea-wrap">
      <textarea id="input-text" placeholder="Type or paste text to translate…" maxlength="2000"></textarea>
      <div class="char-count"><span id="char-count">0</span>/2000</div>
    </div>

    <button id="translate-btn" class="translate-btn">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none">
        <path d="M5 12h14M12 5l7 7-7 7" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      Translate
    </button>

    <div id="output-wrap" class="output-wrap" style="display:none">
      <div class="output-header">
        <span id="output-lang-label" class="output-lang-label"></span>
        <button id="copy-btn" class="copy-btn">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none">
            <rect x="9" y="9" width="13" height="13" rx="2" stroke="currentColor" stroke-width="2"/>
            <path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1" stroke="currentColor" stroke-width="2"/>
          </svg>
          Copy
        </button>
      </div>
      <div id="output-text" class="output-text"></div>
    </div>

    <section class="history-section">
      <div class="section-header">
        <span class="section-title">Recent</span>
        <button id="clear-history" class="clear-btn">Clear</button>
      </div>
      <div id="history-list" class="history-list">
        <p class="empty-history">No translations yet.</p>
      </div>
    </section>

    <footer>
      <span>Google TMT Hackathon 2026</span>
      <span>Alt+T to translate selection</span>
    </footer>
  </div>
  <script src="popup.js"></script>
</body>
</html>
